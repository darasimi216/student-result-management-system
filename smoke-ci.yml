name: Smoke Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand(\"ping\")'" \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment
        env:
          MONGODB_URI: mongodb://localhost:27017/student-results-ci
          JWT_SECRET: ci_test_secret
          PORT: 5000
          NODE_ENV: test
        run: |
          echo "MONGODB_URI=${MONGODB_URI}" >> $GITHUB_ENV
          echo "JWT_SECRET=${JWT_SECRET}" >> $GITHUB_ENV
          echo "PORT=${PORT}" >> $GITHUB_ENV
          echo "NODE_ENV=${NODE_ENV}" >> $GITHUB_ENV

      - name: Seed database
        run: node seeds.js

      - name: Start server
        run: nohup npm start &

      - name: Wait for server
        run: |
          echo 'Waiting for server to be ready...'
          for i in {1..20}; do
            if curl -sSf http://localhost:5000/ >/dev/null; then
              echo 'Server ready';
              exit 0;
            fi
            echo 'Retrying...';
            sleep 2;
          done
          echo 'Server did not start in time';
          exit 1

      - name: Run smoke test
        run: npm run smoke
